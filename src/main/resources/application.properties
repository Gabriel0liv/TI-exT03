spring.application.name=oficina-soap

# Embedded server port, so the WSDL is reachable at localhost:8080.
server.port=8080

# H2 in-memory database: perfect for exam exercises because it resets on restart.
spring.datasource.url=jdbc:h2:mem:oficina;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate creates the table automatically from the entity.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Optional console for manual inspection if you want to open H2 in a browser.
spring.h2.console.enabled=true
